<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEAM Ta'lim Testi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Raleway:wght@400;700;900&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1833;
    --card: #211f3a;
    --accent: #ff6b6b;
    --green: #06d6a0;
    --red: #ef476f;
    --blue: #118ab2;
    --yellow: #ffd166;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: #2e2c4e;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, #ff6b6b22 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #06d6a022 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #118ab211 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .header .badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b6b, #ffd166);
    color: #0f0e17;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    background: linear-gradient(135deg, #fffffe, #a7a9be);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--surface);
    border-radius: 100px;
    height: 8px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ffd166);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 100px;
    justify-content: center;
  }

  .stat-pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .stat-pill.correct .dot { background: var(--green); }
  .stat-pill.wrong .dot { background: var(--red); }
  .stat-pill.total .dot { background: var(--yellow); }
  .stat-pill.num { color: var(--muted); }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeIn 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff6b6b, #ffd166, #06d6a0);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 800;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 700;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* OPTIONS */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
  }

  .option-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.45;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #ff6b6b15;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px #ff6b6b22;
  }

  .option-btn .label {
    min-width: 26px;
    height: 26px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
    transition: all 0.2s ease;
    margin-top: 1px;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: #06d6a018;
    animation: correctPulse 0.4s ease;
  }

  .option-btn.correct .label {
    background: var(--green);
    color: #0f0e17;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: #ef476f18;
    animation: wrongShake 0.4s ease;
  }

  .option-btn.wrong .label {
    background: var(--red);
    color: #fff;
  }

  .option-btn.reveal-correct {
    border-color: var(--green);
    background: #06d6a010;
  }

  .option-btn.reveal-correct .label {
    background: var(--green);
    color: #0f0e17;
  }

  .option-btn:disabled { cursor: default; transform: none !important; box-shadow: none !important; }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.025); }
    100% { transform: scale(1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }

  .feedback.show { display: flex; }
  .feedback.correct-fb { background: #06d6a018; border: 1px solid var(--green); color: var(--green); }
  .feedback.wrong-fb { background: #ef476f18; border: 1px solid var(--red); color: var(--red); }

  .feedback-icon { font-size: 18px; }

  /* NAVIGATION */
  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .nav-btn {
    flex: 1;
    padding: 14px 24px;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }

  .nav-btn.prev {
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--muted);
  }

  .nav-btn.prev:hover { border-color: var(--muted); color: var(--text); }

  .nav-btn.next {
    background: linear-gradient(135deg, #ff6b6b, #ffd166);
    color: #0f0e17;
    box-shadow: 0 4px 20px #ff6b6b44;
  }

  .nav-btn.next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px #ff6b6b55; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none !important; }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.5s ease;
  }

  .result-screen.show { display: block; }

  .result-icon {
    font-size: 80px;
    margin-bottom: 20px;
    display: block;
    animation: bounceIn 0.6s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .result-title {
    font-family: 'Raleway', sans-serif;
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .result-sub {
    color: var(--muted);
    margin-bottom: 32px;
    font-size: 16px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 500px;
    margin: 0 auto 32px;
  }

  @media (max-width: 400px) {
    .result-grid { grid-template-columns: 1fr; }
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
  }

  .result-card .val {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 6px;
  }

  .result-card .lbl {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .result-card.green .val { color: var(--green); }
  .result-card.red .val { color: var(--red); }
  .result-card.yellow .val { color: var(--yellow); }
  .result-card.blue .val { color: #118ab2; }

  .grade-display {
    background: linear-gradient(135deg, var(--card), var(--surface));
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 28px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .grade-letter {
    font-size: 72px;
    font-weight: 900;
    font-family: 'Raleway', sans-serif;
    line-height: 1;
    margin-bottom: 8px;
  }

  .grade-text { color: var(--muted); font-size: 14px; }

  .restart-btn {
    background: linear-gradient(135deg, #ff6b6b, #ffd166);
    color: #0f0e17;
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 24px #ff6b6b44;
    margin-top: 8px;
  }

  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px #ff6b6b55; }

  /* QUIZ AREA */
  #quiz-area { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">📚 Maktabgacha ta'lim</div>
    <h1>STEAM Texnologiyalari Testi</h1>
    <p>200 ta savol • Har bir savolga faqat bitta to'g'ri javob</p>
  </div>

  <div id="quiz-area">
    <div class="stats-bar">
      <div class="stat-pill num" id="stat-num"><span class="dot" style="background:var(--yellow)"></span><span id="num-text">Savol 1/200</span></div>
      <div class="stat-pill correct"><span class="dot"></span><span id="correct-count">✓ 0 to'g'ri</span></div>
      <div class="stat-pill wrong"><span class="dot"></span><span id="wrong-count">✗ 0 xato</span></div>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">SAVOL 1</div>
      <div class="q-text" id="q-text">Yuklanmoqda...</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fb-icon"></span>
        <span id="fb-text"></span>
      </div>
    </div>

    <div class="nav-btns">
      <button class="nav-btn prev" id="prev-btn" onclick="navigate(-1)">← Oldingi</button>
      <button class="nav-btn next" id="next-btn" onclick="navigate(1)">Keyingi →</button>
    </div>
  </div>

  <div class="result-screen" id="result-screen">
    <span class="result-icon" id="result-icon">🎓</span>
    <div class="result-title" id="result-title">Test yakunlandi!</div>
    <div class="result-sub" id="result-sub">Barcha savollarni ko'rib chiqdingiz</div>

    <div class="grade-display">
      <div class="grade-letter" id="grade-letter" style="color:var(--yellow)">5</div>
      <div class="grade-text" id="grade-text">Baho</div>
    </div>

    <div class="result-grid">
      <div class="result-card green"><div class="val" id="r-correct">0</div><div class="lbl">✓ To'g'ri</div></div>
      <div class="result-card red"><div class="val" id="r-wrong">0</div><div class="lbl">✗ Xato</div></div>
      <div class="result-card yellow"><div class="val" id="r-percent">0%</div><div class="lbl">Foiz</div></div>
      <div class="result-card blue"><div class="val" id="r-total">200</div><div class="lbl">Jami savol</div></div>
    </div>

    <button class="restart-btn" onclick="restartQuiz()">🔄 Qaytadan boshlash</button>
  </div>
</div>

<script>
const rawQuestions = [
  { q: '"Integratsion ta\'lim modeli" qachon yaratilindi?', correct: '2008 yilda', wrong: ['2018 yilda','2014 yilda','2004 yilda'] },
  { q: '................. bu fikr, g\'oya, niyat yoki biror narsa qilishning maqsadi. Nuqtalar o\'rniga to\'g\'ri javobni qo\'ying', correct: 'Loyiha', wrong: ['Loyihalash','Texnologik xarita','Model'] },
  { q: 'Integratsiya g\'oyalari jahonda nechinchi asr boshlarida ilgari surila boshlandi?', correct: 'XIX asr oxiri va XX asr boshlarida', wrong: ['XI asr oxiri va XX asr boshlarida','XII asr oxiri va XI asr boshlarida','XIX asr oxiri va XI asr boshlarida'] },
  { q: 'nem.tendens, lot.ten-dere, yo\'nalmoq, intilmoq. taraqqiyot yo\'nalishi, biron narsaga qiziqish, intilish, moyillik. Ma\'lum o\'y-muloxaza, tasvir yoki asarning asosiy mazmuni, g\'oyasi nima deb ataladi?', correct: 'Tendensiya', wrong: ['Yondashuv','Texnologiya','Enjenriya'] },
  { q: '"Texnologiya tushunchasi texnikaviy taraqqiyot bilan bog\'liq holda fanga qachon kirib kelgan?"', correct: '1872 yil', wrong: ['1871 yil','1870 yil','1877 yil'] },
  { q: '"Biz hozir ilm-fan va texnologiya takomillashgan davrda yashamoqdamiz, bu sizning muhandislik noyob tadqiqotlaringiz va rivojlanishingizning ko\'p qismini birlashtiradi, buni esa siz san\'at va matematikani tushunmasdan yarata olmaysiz". Ushbu fikr egasini belgilang', correct: 'Jorjetta Yakman', wrong: ['Fridrix Frebel','K.D. Ushinskiy','G.N. Vodovozova'] },
  { q: '"O\'zi qila olishiga ko\'zi yetgan bolaga hech qachon yordam berma" kimning shiyori?', correct: 'M.Montessori', wrong: ['K.D.Ushinskiy','Ya.Amos.Komenskiy','F.Frebel'] },
  { q: 'Takomillashtirilgan "Ilk qadam" davlat o\'quv dasturi qachon tasdiqlangan?', correct: '2022-yil 4-fevralda', wrong: ['2018 yil 7-iyulda','2022-yil 14-fevralda','To\'g\'ri javob yo\'q'] },
  { q: '"Insonni tarbiyalash", "Onalar va mehribonlik qo\'shiqlari", "Balli o\'yinlar uchun yuzta qo\'shiq" kabi asarlar muallifini belgilang', correct: 'Fridrix Frebel', wrong: ['M.Montessori','K.D.Ushinskiy','Jorjetta Yakman'] },
  { q: '"Maktabgacha ta\'lim va tarbiya to\'g\'risida"gi Qonun qachon qabul qilingan', correct: 'O\'RQ 595- son 16-dekabr 2019 yil', wrong: ['O\'RQ 595 son 14-dekabr 2019 yil','O\'RQ 637-son 20-fevral.2020 yil','O\'RQ 637 son 23-sentyabr.2020 yil'] },
  { q: '"R.V.R." ("Rossum\'s Universal Robots") birinchi marta nechinchi yilda sahnalashtirilgan va tomoshabinlar bilan muvaffaqiyat qozongan?', correct: '1921 yilda', wrong: ['1920 yilda','1924 yilda','1931 yilda'] },
  { q: '"Robotexnika" so\'zini birinchi marta Isaak Asimov 1941 yilda qanday nomli nashr etilgan ilmiy-fantastik hikoyasida ishlatgan?', correct: '"Yolg\'onchi"', wrong: ['"Tan sog\'chi"','"Yolg\'onchi Robo"','To\'g\'ri javob yo\'q'] },
  { q: '"Robotika" so\'zi qachon va kim tomonidan kiritilingan?', correct: '1920 yilda chex yozuvchisi Karel Kapek va uning ukasi Yozef tomonidan', wrong: ['1921 yilda chex yozuvchisi Karel Kapek va uning ukasi Yozef tomonidan','1920 yilda nemis yozuvchisi K.Dari va uning ukasi Yozef tomonidan','1921 yilda fransuz yozuvchisi Karel Dari va uning ukasi Yozef tomonidan'] },
  { q: '"Sun\'iy askar" modelini yaratgan olim kim?', correct: '1893 yilda Archi Kempin', wrong: ['1865 yilda dizayner Jonni Breynard','1894 yilda Archi Kempin','To\'g\'ri javob yo\'q'] },
  { q: '"Texnologiya" tushunchasi texnikaviy taraqqiyot bilan bog\'liq holda fanga nechinchi yilda kirib keldi?', correct: '1872 yilda', wrong: ['1874 yilda','1876 yilda','1974 yilda'] },
  { q: '(grekcha: "techno" — hunar, usta va "logos" — fan, ta\'lim) ilmiy-praktika asosida xom-ashyoni tayyor mahsulotga aylantirishning usullari — bu?', correct: 'Texnologiya', wrong: ['Muhandislik','Matematika','ilm-fan'] },
  { q: '...(yunoncha «metodos» - usul, yo\'l) ushbu so\'z nomi qaysi qatorda keltirilgan?', correct: 'Metod', wrong: ['Tamoyil','Vosita','Qonuniyat'] },
  { q: '...........bu raqamli texnologiyalar bo\'lib, АКТ sohasining rivojlanishini zamonaviy tamoyillari haqida ma\'lumotlar beradi. Bu qanday texnologiya?', correct: 'Digital texnologiyalar', wrong: ['STEAM texnologiyalari','AKT texnologiyalari','Robot texnologiyalar'] },
  { q: '"Big Ideas Fest" e\'tirofiga sazovor bo\'lgan olima kim?', correct: 'Jorjetta Yakman', wrong: ['Erik Grimson','M.Montessori','A.Leushina'] },
  { q: '"Birlashtirish", "bog\'lanish", "yig\'ish" ma\'nosini anglatuvchi atamasi ta\'lim jarayonida bir necha ma\'nolarni anglatadi. Bu qaysi ta\'lim?', correct: 'Integratsion', wrong: ['Imitatsion','Yondashuvli','Kompetensiyaviy'] },
  { q: '"Bolalar bog\'chasi" konsepsiyasini yaratuvchisi bu kim?', correct: 'F.Frebel', wrong: ['M.Montessori','K.D.Ushinskiy','Ya.Amos.Komenskiy'] },
  { q: '"Bolalarning ijodiy fikrlashini rivojlantirish vositasi" nomli ishlanma kimga tegishli?', correct: 'Erik Robelen', wrong: ['I.G.Pestalotssi','A.P.Usova','Montessori'] },
  { q: '"Fridrix Frebelning didaktik tizimi" o\'quv moduli nechta kontent blokidan iborat va nechchi turdagi to\'plamlar bilan ta\'minlangan?', correct: '2 kontent va 2 to\'plam', wrong: ['2 kontent va 4 to\'plam','4 kontent va 2 to\'plam','4 kontent va 4 to\'plam'] },
  { q: '"Integratsion ta\'lim modeli" qachon yaratilindi? (takroriy savol)', correct: '2008 yilda', wrong: ['2006 yilda','2004 yilda','2011 yilda'] },
  { q: '«Frebel tuhfalari» — bu olim tomonidan ishlab chiqilgan didaktik material bo\'lib, bolani ilk yoshda rivojlanishiga mo\'ljallangan. Ular nechta tuhfadan iborat?', correct: '6 ta tuhfa', wrong: ['7 tuhfa','5 ta tuhfa','8 ta tuhfa'] },
  { q: '«STEAM forward» xalqaro konferensiyasi qayerda bo\'lib o\'tgan?', correct: '2014-yilda Quddusda', wrong: ['2015-yilda Quddusda','2014 yilda Marokashda','2014 yilda AQSHda'] },
  { q: '"Texnologiya - bu har qanday ish, faoliyat, mahorat va san\'atda ishlatiladigan uslublar majmuasidir". Bu kimning lug\'atiga tegishli?', correct: 'V.Lopatin', wrong: ['K.D.Ushinskiy','F.Frebel','M.Montessori'] },
  { q: '......... bu kichkina yog\'och shar, kub va silindr (to\'pning diametri, silindrning asosi va kub tomoni bir xil). Ularning yordami bilan bola ob\'ektlarning turli shakllarini bilib oladi. Qaysi sovg\'a?', correct: 'Ikkinchi sovg\'a', wrong: ['Birinchi sovg\'a','Uchinchi sovg\'a','To\'rtinchi sovg\'a'] },
  { q: '............. yoshga to\'lgach, asosiy shakllar, ranglar, makon va vaqt haqida ilk tasavvurlari shakllanadi. U obyektning kattaligi va ulami taqqoslash haqidagi g\'oyani shakllantiradi. Qaysi yosh guruhi nazarda tutilgan?', correct: '4-5 yosh', wrong: ['5-6 yosh','6-7 yosh','3-7 yosh'] },

// Shuffle function
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build shuffled questions with shuffled options
const questions = rawQuestions.map((q, idx) => {
  const allOptions = shuffle([q.correct, ...q.wrong]);
  return {
    num: idx + 1,
    q: q.q,
    options: allOptions,
    correctIndex: allOptions.indexOf(q.correct)
  };
});

// State
let current = 0;
let answers = new Array(questions.length).fill(null); // null | index chosen
let correctCount = 0;
let wrongCount = 0;

const labels = ['A', 'B', 'D', 'E'];

function render() {
  const q = questions[current];
  document.getElementById('q-number').textContent = `SAVOL ${q.num}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('num-text').textContent = `Savol ${current + 1}/200`;

  // Progress
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progress-bar').style.width = (answered / questions.length * 100) + '%';

  // Stats
  document.getElementById('correct-count').textContent = `✓ ${correctCount} to\'g\'ri`;
  document.getElementById('wrong-count').textContent = `✗ ${wrongCount} xato`;

  // Options
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const chosen = answers[current];
  const isAnswered = chosen !== null;

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (isAnswered) {
      if (i === q.correctIndex) btn.classList.add(chosen === i ? 'correct' : 'reveal-correct');
      else if (i === chosen) btn.classList.add('wrong');
      btn.disabled = true;
    }
    btn.innerHTML = `<span class="label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => chooseAnswer(i);
    optDiv.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fb-icon');
  const fbText = document.getElementById('fb-text');
  if (isAnswered) {
    fb.classList.add('show');
    if (chosen === q.correctIndex) {
      fb.className = 'feedback show correct-fb';
      fbIcon.textContent = '✅';
      fbText.textContent = 'To\'g\'ri javob! Ajoyib!';
    } else {
      fb.className = 'feedback show wrong-fb';
      fbIcon.textContent = '❌';
      fbText.textContent = `Xato! To\'g\'ri javob: "${q.options[q.correctIndex]}"`;
    }
  } else {
    fb.className = 'feedback';
  }

  // Nav buttons
  document.getElementById('prev-btn').disabled = current === 0;
  const nextBtn = document.getElementById('next-btn');
  if (current === questions.length - 1) {
    nextBtn.textContent = 'Natijani ko\'rish 🎓';
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = 'Keyingi →';
    nextBtn.disabled = false;
  }

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.35s ease';
}

function chooseAnswer(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  const q = questions[current];
  if (i === q.correctIndex) correctCount++;
  else wrongCount++;
  render();
}

function navigate(dir) {
  if (current === questions.length - 1 && dir === 1) {
    showResult();
    return;
  }
  const next = current + dir;
  if (next < 0 || next >= questions.length) return;
  current = next;
  render();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const total = questions.length;
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((correctCount / total) * 100);

  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = wrongCount;
  document.getElementById('r-percent').textContent = pct + '%';
  document.getElementById('r-total').textContent = total;

  let grade, gradeColor, icon, title, sub;
  if (pct >= 86) { grade = '5'; gradeColor = 'var(--green)'; icon = '🏆'; title = 'A\'lo natija!'; sub = 'Siz STEAM bo\'yicha mutaxasssissiz!'; }
  else if (pct >= 71) { grade = '4'; gradeColor = 'var(--yellow)'; icon = '🌟'; title = 'Yaxshi natija!'; sub = 'Bilimlaringiz juda yaxshi darajada!'; }
  else if (pct >= 56) { grade = '3'; gradeColor = 'var(--blue)'; icon = '📚'; title = 'Qoniqarli'; sub = 'Yana bir oz o\'qishingiz kerak!'; }
  else { grade = '2'; gradeColor = 'var(--red)'; icon = '💪'; title = 'Harakat qiling!'; sub = 'Bilimlarni mustahkamlash kerak!'; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('grade-letter').textContent = grade;
  document.getElementById('grade-letter').style.color = gradeColor;
  document.getElementById('grade-text').textContent = `Baho: ${grade} (${pct}%)`;
}

function restartQuiz() {
  answers = new Array(questions.length).fill(null);
  correctCount = 0;
  wrongCount = 0;
  current = 0;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  render();
}

// Init
render();
</script>
